name: Build Packages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:
    inputs:
      create_snapshot:
        description: '创建带日期的快照 Release'
        required: false
        type: boolean
        default: false
      force_rebuild:
        description: '强制重新构建的包（逗号分隔，如: package1,package2）'
        required: false
        type: string
        default: ''
      skip_packages:
        description: '跳过检查更新和构建的包（逗号分隔，如: package1,package2）'
        required: false
        type: string
        default: ''
      log_level:
        description: '日志级别 (DEBUG, INFO, WARN, ERROR)'
        required: false
        type: choice
        options:
          - INFO
          - DEBUG
          - WARN
          - ERROR
        default: 'INFO'

env:
  REPO_NAME: skorion

jobs:
  # ===========================================================================
  # Job 1: 检测更新并列出需要构建的包
  # ===========================================================================
  list-packages:
    name: Detect Updates
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      aur-packages: ${{ steps.set-aur.outputs.matrix }}
      local-packages: ${{ steps.set-local.outputs.matrix }}
      all-packages: ${{ steps.set-all.outputs.matrix }}
      has-updates: ${{ steps.check-updates.outputs.has-updates }}
    steps:
      - uses: actions/checkout@v4
      
      # 缓存 makepkg 源码目录，加速版本检测（特别是 mesa-git 等大型仓库）
      - name: Cache makepkg sources for version detection
        uses: actions/cache@v4
        with:
          path: /tmp/makepkg-cache
          key: version-check-sources-${{ hashFiles('aur.conf', 'aur-pinned.conf') }}
          restore-keys: |
            version-check-sources-
      
      - name: Cache pacman packages
        uses: actions/cache@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-pkg-${{ runner.os }}-${{ hashFiles('**/PKGBUILD') }}
          restore-keys: |
            pacman-pkg-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          # base-devel: 包含 makepkg 等构建工具
          # git, svn, mercurial, bzr: VCS 工具（pkgver() 函数可能需要）
          # cargo, rust: Rust 项目的 pkgver() 可能需要
          # jq, curl, tar, findutils, meson: 脚本依赖
          pacman -S --noconfirm base-devel git svn mercurial bzr cargo rust jq curl tar findutils sudo meson python
      
      - name: Clean up stale locks from previous runs
        run: |
          echo "==> 清理之前可能遗留的锁"
          
          LOCKS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/matching-refs/locks/" \
            | jq -r '.[].ref // empty' 2>/dev/null || echo "")
          
          if [ -z "$LOCKS" ]; then
            echo "  ✓ 没有遗留的锁"
          else
            echo "  发现遗留的锁，开始清理..."
            echo "$LOCKS" | while read ref; do
              if [ -n "$ref" ]; then
                echo "    删除: $ref"
                HTTP_CODE=$(curl -s -w "%{http_code}" -o /dev/null -X DELETE \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/${{ github.repository }}/git/$ref")
                
                if [ "$HTTP_CODE" = "204" ]; then
                  echo "      ✓ 删除成功"
                elif [ "$HTTP_CODE" = "404" ]; then
                  echo "      ⚠ 已不存在"
                else
                  echo "      ⚠ 删除失败 (HTTP $HTTP_CODE)"
                fi
                sleep 0.3
              fi
            done
            echo "  ✓ 清理完成"
          fi
      
      - name: Setup builder user
        run: |
          # 创建 builder 用户（makepkg 不允许 root 运行）
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # 给予工作目录权限
          chown -R builder:builder $GITHUB_WORKSPACE
          
          # 设置缓存目录权限
          mkdir -p /tmp/makepkg-cache
          chown -R builder:builder /tmp/makepkg-cache
          
          mkdir -p /var/cache/pacman/pkg
          chmod 755 /var/cache/pacman/pkg
      
      - name: Check package updates
        id: check-updates
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || '' }}
          SKIP_PACKAGES: ${{ github.event.inputs.skip_packages || '' }}
          LOG_LEVEL: ${{ github.event.inputs.log_level || 'INFO' }}
          SRCDEST: /tmp/makepkg-cache
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 清理可能存在的 git 锁文件，避免缓存冲突
          find /tmp/makepkg-cache -name "*.lock" -type f -delete 2>/dev/null || true
          
          # 以 builder 用户运行检查脚本，保留环境变量
          sudo -u builder \
            REPO_OWNER="$REPO_OWNER" \
            REPO_NAME="$REPO_NAME" \
            FORCE_REBUILD="$FORCE_REBUILD" \
            SKIP_PACKAGES="$SKIP_PACKAGES" \
            LOG_LEVEL="$LOG_LEVEL" \
            SRCDEST="$SRCDEST" \
            GH_TOKEN="$GH_TOKEN" \
            bash scripts/check-updates.sh
      
      - name: List AUR packages to build
        id: set-aur
        run: |
          if [ -s updated-aur-packages.txt ]; then
            packages=$(cat updated-aur-packages.txt | jq -R -s -c 'split("\n")[:-1]')
          else
            packages="[]"
          fi
          echo "matrix=$packages" >> $GITHUB_OUTPUT
          echo "AUR packages to build: $packages"
      
      - name: List local packages to build
        id: set-local
        run: |
          if [ -s updated-local-packages.txt ]; then
            packages=$(cat updated-local-packages.txt | jq -R -s -c 'split("\n")[:-1]')
          else
            packages="[]"
          fi
          echo "matrix=$packages" >> $GITHUB_OUTPUT
          echo "Local packages to build: $packages"
      
      - name: Merge package lists
        id: set-all
        run: |
          # 合并 AUR 和本地包列表，添加类型标记
          aur_packages='${{ steps.set-aur.outputs.matrix }}'
          local_packages='${{ steps.set-local.outputs.matrix }}'
          
          # 为每个包添加类型字段（使用 -c 压缩成单行）
          all_packages=$(jq -nc \
            --argjson aur "$aur_packages" \
            --argjson local "$local_packages" \
            '($aur | map({package: ., type: "aur"})) + ($local | map({package: ., type: "local"}))')
          
          echo "matrix=$all_packages" >> $GITHUB_OUTPUT
          echo "All packages to build: $(echo "$all_packages" | jq -c '.[0:3]')... (total: $(echo "$all_packages" | jq 'length'))"

  # ===========================================================================
  # Job 2: 并行构建所有包（AUR + 本地）
  # ===========================================================================
  build-packages:
    needs: list-packages
    name: Build Packages
    runs-on: ubuntu-latest
    if: needs.list-packages.outputs.all-packages != '[]'
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJson(needs.list-packages.outputs.all-packages) }}
    
    steps:
      - uses: actions/checkout@v4
      
      # 恢复构建缓存（与检测阶段共享）
      - name: Restore makepkg sources cache for building
        uses: actions/cache/restore@v4
        with:
          path: /tmp/makepkg-cache
          key: version-check-sources-${{ hashFiles('aur.conf', 'aur-pinned.conf') }}
          restore-keys: |
            version-check-sources-
      
      - name: Restore pacman cache for building
        uses: actions/cache/restore@v4
        with:
          path: /var/cache/pacman/pkg
          key: pacman-pkg-${{ runner.os }}-${{ hashFiles('**/PKGBUILD') }}
          restore-keys: |
            pacman-pkg-${{ runner.os }}-
      
      # 确保缓存目录存在
      - name: Setup cache directory
        run: |
          mkdir -p /tmp/makepkg-cache
          chmod 777 /tmp/makepkg-cache
          sudo mkdir -p /var/cache/pacman/pkg
          sudo chmod 777 /var/cache/pacman/pkg
      
      - name: Check if package needs full cleanup
        id: check-cleanup
        run: |
          PACKAGE="${{ matrix.package }}"
          
          # Read full-cleanup-packages.conf if exists
          if [ -f "full-cleanup-packages.conf" ]; then
            # Remove comments and empty lines, then check if package is in the list
            if grep -v '^#' full-cleanup-packages.conf | grep -v '^[[:space:]]*$' | grep -Fxq "$PACKAGE"; then
              echo "needs_full_cleanup=true" >> $GITHUB_OUTPUT
              echo "✓ Package '$PACKAGE' needs full disk cleanup"
            else
              echo "needs_full_cleanup=false" >> $GITHUB_OUTPUT
              echo "✓ Package '$PACKAGE' uses standard cleanup"
            fi
          else
            # Default to standard cleanup if file doesn't exist
            echo "needs_full_cleanup=false" >> $GITHUB_OUTPUT
            echo "⚠ full-cleanup-packages.conf not found, using standard cleanup"
          fi
      
      - name: Free Disk Space - standard
        if: steps.check-cleanup.outputs.needs_full_cleanup == 'false'
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          rm_cmd: "rmz"  # Use 'rmz' for faster deletion (default: 'rm')
          rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false

      - name: Free Disk Space - full
        if: steps.check-cleanup.outputs.needs_full_cleanup == 'true'
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rm"  # Use 'rmz' for faster deletion (default: 'rm')
          rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false
      
      - name: Check build mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.create_snapshot }}" = "true" ]; then
            echo "snapshot=true" >> $GITHUB_OUTPUT
            echo "==> 快照模式"
          else
            echo "snapshot=false" >> $GITHUB_OUTPUT
            echo "==> 增量模式"
          fi
      
      - name: Build ${{ matrix.type }} package - ${{ matrix.package }}
        id: build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/output"
          
          # 为每个包使用独立的 SRCDEST 子目录，避免 git 仓库名称冲突
          PACKAGE_SRCDEST="/tmp/makepkg-cache/${{ matrix.package }}"
          mkdir -p "$PACKAGE_SRCDEST"
          chmod 777 "$PACKAGE_SRCDEST"
          
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v "$PACKAGE_SRCDEST:/tmp/makepkg-cache" \
            -v "/var/cache/pacman/pkg:/var/cache/pacman/pkg" \
            -e SRCDEST=/tmp/makepkg-cache \
            -w /workspace \
            archlinux:latest \
            bash /workspace/scripts/build-in-container.sh "${{ matrix.package }}" "${{ matrix.type }}"
      
      # 所有模式：实时上传到 latest release（快照模式最后会重建数据库确保一致性）
      - name: Acquire database lock
        id: lock
        if: success()
        continue-on-error: true
        run: |
          echo "==> 尝试获取数据库锁"
          MAX_RETRIES=60
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs" \
              -d "{\"ref\": \"refs/locks/database\", \"sha\": \"${{ github.sha }}\"}")
            
            if echo "$RESPONSE" | jq -e '.object' >/dev/null 2>&1; then
              echo "✓ 获取锁成功"
              echo "locked=true" >> $GITHUB_OUTPUT
              exit 0
            elif echo "$RESPONSE" | grep -q "already exists"; then
              echo "锁被占用，等待中... ($((RETRY_COUNT+1))/$MAX_RETRIES)"
              sleep 5
              RETRY_COUNT=$((RETRY_COUNT+1))
            else
              echo "⚠️ API 错误: $RESPONSE"
              echo "跳过数据库更新"
              echo "locked=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "⚠️ 获取锁超时，将跳过数据库更新"
            echo "包文件已上传，最终会由 finalize/snapshot 任务统一更新数据库"
            echo "locked=false" >> $GITHUB_OUTPUT
            exit 0
          fi
      
      - name: Upload package to latest release
        if: success()
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: output/*.pkg.tar.zst
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download and update database
        if: success() && steps.lock.outputs.locked == 'true'
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            archlinux:latest \
            bash /workspace/scripts/update-repo-database.sh "${{ github.repository }}"
      
      - name: Upload updated database
        if: success() && steps.lock.outputs.locked == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: |
            skorion.db.tar.gz
            skorion.files.tar.gz
            skorion.db
            skorion.files
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release database lock
        if: always() && steps.lock.outputs.locked == 'true'
        run: |
          echo "==> 释放数据库锁"
          
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /dev/null -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/locks/database")
          
          if [ "$HTTP_CODE" = "204" ]; then
            echo "✓ 锁释放成功"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "⚠ 锁不存在（可能已被其他任务释放）"
          else
            echo "⚠ 锁释放失败 (HTTP $HTTP_CODE)，但不影响流程"
          fi

  # ===========================================================================
  # Job 3: 快照模式 - 收集所有包并生成完整仓库数据库
  # ===========================================================================
  generate-snapshot:
    needs: [list-packages, build-packages]
    name: Generate Snapshot Repository
    runs-on: ubuntu-latest
    if: |
      always() && 
      (github.event_name == 'schedule' || github.event.inputs.create_snapshot == 'true') &&
      needs.build-packages.result != 'cancelled'
    container:
      image: archlinux:latest
    outputs:
      should-publish: ${{ steps.verify-packages.outputs.should-continue }}
      is-snapshot: ${{ steps.check-mode.outputs.is-snapshot }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm pacman-contrib curl jq python
      
      - name: Check build mode
        id: check-mode
        env:
          CREATE_SNAPSHOT: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.create_snapshot) }}
        run: |
          echo "is-snapshot=$CREATE_SNAPSHOT" >> $GITHUB_OUTPUT
          if [ "$CREATE_SNAPSHOT" = "true" ]; then
            echo "==> 🗓️  快照模式：将创建完整的包集合快照"
          else
            echo "==> 🔄 增量模式：仅更新变更的包"
          fi
      
      # 快照模式：清理重复版本并下载所有包
      - name: Clean duplicates and download all packages (snapshot mode)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.create_snapshot)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RELEASE_TAG: latest
        run: |
          echo "==> 清理 release 中的重复版本"
          mkdir -p /tmp/empty_for_scan
          OUTPUT_DIR=/tmp/empty_for_scan bash scripts/clean-old-assets.sh
          
          echo "==> 验证清理结果"
          DUPES=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" | \
            jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .name' | \
            while read name; do python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$name"; done | \
            sed 's/-[0-9].*\.pkg\.tar\.zst$//' | sort | uniq -d)
          
          if [ -n "$DUPES" ]; then
            echo "❌ 错误：仍然存在重复的包："
            echo "$DUPES"
            exit 1
          fi
          echo "✓ 验证通过：无重复版本"
          
          echo ""
          echo "==> 下载 latest release 中的所有包（含新构建的）"
          mkdir -p output
          
          LATEST_JSON=$(curl -s "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/tags/latest" || echo "{}")
          
          if echo "$LATEST_JSON" | jq -e '.message == "Not Found"' > /dev/null 2>&1; then
            echo "  latest release 不存在，这是首次构建"
            exit 0
          fi
          
          # 下载所有包文件
          echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .browser_download_url' | while read url; do
            filename=$(basename "$url")
            filename=$(python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$filename")
            echo "  下载 $filename"
            curl -sL "$url" -o "output/$filename"
          done
          
          pkg_count=$(ls -1 output/*.pkg.tar.zst 2>/dev/null | wc -l)
          echo "==> 共下载 $pkg_count 个包"
      
      # 增量模式不需要额外操作（包已实时上传到 latest）
      # 快照模式已在上一步下载所有包
      - name: List packages in output directory
        id: list-packages
        run: |
          echo "==> output 目录中的包:"
          ls -lh output/ 2>/dev/null || echo "  output 目录为空或不存在"
          
          pkg_count=$(ls -1 output/*.pkg.tar.zst 2>/dev/null | wc -l || echo 0)
          echo "total_packages=$pkg_count" >> $GITHUB_OUTPUT
          echo "==> 共 $pkg_count 个包"
      
      - name: Verify package files exist
        id: verify-packages
        env:
          TOTAL_PACKAGES: ${{ steps.list-packages.outputs.total_packages }}
          HAS_NEW_BUILDS: ${{ needs.list-packages.outputs.all-packages != '[]' }}
          IS_SNAPSHOT: ${{ steps.check-mode.outputs.is-snapshot }}
        run: |
          pkg_count="${TOTAL_PACKAGES:-0}"
          
          if [ "$pkg_count" -eq 0 ]; then
            # 快照模式下没有包：异常情况（应该至少有已存在的包）
            if [ "$IS_SNAPSHOT" = "true" ]; then
              echo "❌ 错误: 快照模式下没有找到任何包文件"
              echo "  这可能是首次构建且没有包更新"
              echo "should-continue=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            # 增量模式下没有包：正常情况（可能没有包更新）
            echo "==> 增量模式：无包数据，跳过后续步骤"
            echo "should-continue=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✓ 找到 $pkg_count 个包文件"
          
          # 快照模式：需要生成完整数据库
          # 增量模式：数据库已由实时更新维护，无需重新生成
          if [ "$IS_SNAPSHOT" = "true" ]; then
            echo "==> 快照模式：将生成完整数据库"
            echo "should-continue=true" >> $GITHUB_OUTPUT
          else
            echo "==> 增量模式：数据库已实时更新，跳过"
            echo "should-continue=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate repository database
        if: steps.verify-packages.outputs.should-continue == 'true'
        env:
          OUTPUT_DIR: ./output
        run: |
          bash scripts/generate-repo.sh
      
      - name: Upload database artifacts (snapshot mode)
        if: steps.verify-packages.outputs.should-continue == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: repository-database
          path: |
            output/*.db*
            output/*.files*
          retention-days: 1

  # ===========================================================================
  # Job 4: 增量模式 - 清理和最终一致性检查
  # ===========================================================================
  finalize-incremental:
    needs: [list-packages, build-packages]
    name: Finalize Incremental Update
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name != 'schedule' &&
      github.event.inputs.create_snapshot != 'true' &&
      needs.build-packages.result != 'cancelled' &&
      needs.list-packages.outputs.all-packages != '[]'
    container:
      image: archlinux:latest
    outputs:
      should-publish: ${{ steps.verify.outputs.should-continue }}
      new-package-count: ${{ steps.verify.outputs.new-package-count }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm pacman-contrib curl jq python
      
      - name: Clean up all lock refs
        run: |
          echo "==> 清理所有遗留的锁 refs"
          
          # 获取所有 locks refs
          LOCKS=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/matching-refs/locks/" \
            | jq -r '.[].ref // empty')
          
          if [ -z "$LOCKS" ]; then
            echo "  没有遗留的锁"
          else
            echo "  发现遗留锁:"
            echo "$LOCKS" | while read ref; do
              echo "    - $ref"
            done
            
            # 删除所有锁 refs
            echo "$LOCKS" | while read ref; do
              if [ -n "$ref" ]; then
                echo "  删除: $ref"
                HTTP_CODE=$(curl -s -w "%{http_code}" -o /dev/null -X DELETE \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/${{ github.repository }}/git/$ref")
                
                if [ "$HTTP_CODE" = "204" ]; then
                  echo "    ✓ 删除成功"
                elif [ "$HTTP_CODE" = "404" ]; then
                  echo "    ⚠ 已不存在"
                else
                  echo "    ⚠ 删除失败 (HTTP $HTTP_CODE)"
                fi
                sleep 0.5
              fi
            done
          fi
          
          echo "==> 锁清理完成"
      
      - name: Clean old package versions before consistency check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          OUTPUT_DIR: /tmp/empty_for_scan
          RELEASE_TAG: latest
        run: |
          echo "==> 清理旧包版本以确保一致性检查准确"
          # 确保使用扫描重复版本模式（OUTPUT_DIR 为空）
          mkdir -p "$OUTPUT_DIR"
          bash scripts/clean-old-assets.sh
          
          echo "==> 验证清理结果"
          DUPES=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" | \
            jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .name' | \
            while read name; do python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$name"; done | \
            sed 's/-[0-9].*\.pkg\.tar\.zst$//' | sort | uniq -d)
          
          if [ -n "$DUPES" ]; then
            echo "⚠️ 警告：仍然存在重复的包："
            echo "$DUPES"
            echo "这可能会导致数据库不一致"
          else
            echo "✓ 无重复版本"
          fi
      
      - name: Check database consistency
        id: check-db
        run: |
          echo "==> 检查数据库一致性"
          
          # 获取 latest release 信息
          LATEST_JSON=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" || echo "{}")
          
          # 检查 latest release 是否存在
          if echo "$LATEST_JSON" | jq -e '.message == "Not Found"' > /dev/null 2>&1; then
            echo "  latest release 不存在（首次构建后的第一次增量更新）"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            echo "has_packages=false" >> $GITHUB_ENV
            exit 0
          fi
          
          # 下载当前数据库
          mkdir -p output
          echo "  下载当前数据库..."
          if ! curl -sfL "https://github.com/${{ github.repository }}/releases/download/latest/skorion.db.tar.gz" -o output/skorion.db.tar.gz; then
            echo "  ⚠️ 数据库下载失败或不存在，需要重建"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "has_packages=true" >> $GITHUB_ENV
            exit 0
          fi
          
          # 提取数据库中的包列表
          echo "  提取数据库包列表..."
          mkdir -p db_temp
          tar -xzf output/skorion.db.tar.gz -C db_temp 2>/dev/null || {
            echo "  ⚠️ 数据库文件损坏，需要重建"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "has_packages=true" >> $GITHUB_ENV
            rm -rf db_temp output/skorion.db.tar.gz
            exit 0
          }
          
          # 从 desc 文件中提取包名和版本
          db_packages=$(for desc_file in db_temp/*/desc; do
            if [ -f "$desc_file" ]; then
              pkg_name=""
              pkg_version=""
              pkg_arch=""
              while IFS= read -r line; do
                if [ "$line" = "%NAME%" ]; then
                  read -r pkg_name
                elif [ "$line" = "%VERSION%" ]; then
                  read -r pkg_version
                elif [ "$line" = "%ARCH%" ]; then
                  read -r pkg_arch
                fi
              done < "$desc_file"
              if [ -n "$pkg_name" ] && [ -n "$pkg_version" ] && [ -n "$pkg_arch" ]; then
                # 转换 epoch 格式: version:x -> version--x (文件系统命名规则)
                echo "${pkg_name}-${pkg_version/:/--}-${pkg_arch}.pkg.tar.zst"
              fi
            fi
          done | sort)
          
          rm -rf db_temp
          
          # 获取 latest release 中的实际包列表
          echo "  获取 release 包列表..."
          release_packages=$(echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .name' | \
            while read name; do python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$name"; done | sort)
          
          # 对比包列表
          db_count=$(echo -n "$db_packages" | grep -c . || echo 0)
          release_count=$(echo -n "$release_packages" | grep -c . || echo 0)
          
          echo "  数据库包数量: $db_count"
          echo "  Release 包数量: $release_count"
          
          if [ "$db_packages" = "$release_packages" ]; then
            echo "  ✓ 数据库一致，无需重建"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            echo "has_packages=false" >> $GITHUB_ENV
          else
            echo "  ⚠️ 数据库不一致，需要重建"
            # 显示差异（仅前 10 个）
            if [ -n "$db_packages" ] && [ -n "$release_packages" ]; then
              echo "  数据库中但 release 中没有的包:"
              comm -23 <(printf '%s\n' "$db_packages") <(printf '%s\n' "$release_packages") | head -10 || true
              echo "  release 中但数据库中没有的包:"
              comm -13 <(printf '%s\n' "$db_packages") <(printf '%s\n' "$release_packages") | head -10 || true
            fi
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            echo "has_packages=true" >> $GITHUB_ENV
          fi
      
      - name: Download all packages from latest release
        if: steps.check-db.outputs.needs_rebuild == 'true'
        run: |
          echo "==> 下载所有包以重建数据库"
          
          # 获取 latest release 信息
          LATEST_JSON=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest")
          
          # 下载所有包文件
          mkdir -p output
          echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .browser_download_url' | while read url; do
            filename=$(basename "$url")
            # URL 解码文件名
            filename=$(python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$filename")
            echo "  下载 $filename"
            curl -sL "$url" -o "output/$filename" || echo "    下载失败"
          done
          
          # 统计下载的包数量
          pkg_count=$(ls -1 output/*.pkg.tar.zst 2>/dev/null | wc -l)
          echo "==> 下载完成，共 $pkg_count 个包"
      
      - name: Regenerate complete database
        if: steps.check-db.outputs.needs_rebuild == 'true'
        env:
          OUTPUT_DIR: ./output
        run: |
          echo "==> 重新生成完整数据库"
          bash scripts/generate-repo.sh
      
      - name: Upload complete database and metadata
        if: steps.check-db.outputs.needs_rebuild == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: |
            output/*.db.tar.gz
            output/*.files.tar.gz
            output/*.db
            output/*.files
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Count successfully built packages
        id: count
        run: |
          # 统计本次构建的包数量
          # 通过检查 needs.list-packages 的输出
          total_count=$(echo '${{ needs.list-packages.outputs.all-packages }}' | jq 'length')
          echo "new_packages=$total_count" >> $GITHUB_OUTPUT
          echo "==> 本次构建: $total_count 个包"
      
      - name: Verify finalize result
        id: verify
        run: |
          # 只要有包构建了，就算成功（即使数据库一致无需重建）
          new_count=${{ steps.count.outputs.new_packages }}
          
          if [ "$new_count" -gt 0 ]; then
            echo "should-continue=true" >> $GITHUB_OUTPUT
            echo "new-package-count=$new_count" >> $GITHUB_OUTPUT
            
            if [ "${{ steps.check-db.outputs.needs_rebuild }}" = "true" ]; then
              echo "==> 最终化完成（已重建数据库）"
            else
              echo "==> 最终化完成（数据库一致，已由增量更新维护）"
            fi
          else
            echo "should-continue=false" >> $GITHUB_OUTPUT
            echo "new-package-count=0" >> $GITHUB_OUTPUT
            echo "==> 无包需要发布"
          fi

  # ===========================================================================
  # Job 5: 发布到 GitHub Releases
  # ===========================================================================
  release:
    needs: [list-packages, generate-snapshot, finalize-incremental]
    name: Publish Release
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (
        (needs.generate-snapshot.result == 'success' && needs.generate-snapshot.outputs.should-publish == 'true') ||
        (needs.finalize-incremental.result == 'success' && needs.finalize-incremental.outputs.should-publish == 'true')
      )
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 jq curl
      
      - name: Setup version comparison tool
        run: |
          echo "使用 sort -V 进行版本比较（已验证可正确处理所有版本格式）"
      
      - name: Check release mode
        id: mode
        run: |
          if [ "${{ needs.generate-snapshot.result }}" = "success" ]; then
            echo "mode=snapshot" >> $GITHUB_OUTPUT
            echo "==> 快照模式"
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "==> 增量模式"
          fi

      - name: Download database artifacts (snapshot mode)
        if: steps.mode.outputs.mode == 'snapshot'
        uses: actions/download-artifact@v4
        with:
          name: repository-database
          path: output/
      
      - name: Get package count from latest release
        if: always()
        run: |
          echo "==> 从 latest release 统计包数量"
          mkdir -p output
          
          # 从 release assets 统计包数量（所有模式都从 latest 统计）
          pkg_count=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" | \
            jq '[.assets[] | select(.name | endswith(".pkg.tar.zst"))] | length')
          
          echo "$pkg_count" > /tmp/pkg_count.txt
          echo "==> 仓库总包数: $pkg_count"
      
      - name: Generate release info
        id: release-info
        run: |
          echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "datetime=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          
          # 统计包数量（从 latest release）
          pkg_count=$(cat /tmp/pkg_count.txt 2>/dev/null || echo "0")
          echo "package_count=$pkg_count" >> $GITHUB_OUTPUT
          
          # 统计本次构建的新包数量
          if [ "${{ steps.mode.outputs.mode }}" = "snapshot" ]; then
            # 快照模式：从 list-packages 获取
            new_pkg_count=$(echo '${{ needs.list-packages.outputs.all-packages }}' | jq 'length // 0')
          else
            # 增量模式：从 finalize-incremental 的输出获取
            new_pkg_count="${{ needs.finalize-incremental.outputs.new-package-count }}"
            # 如果为空，设置为 0
            new_pkg_count="${new_pkg_count:-0}"
          fi
          echo "new_package_count=$new_pkg_count" >> $GITHUB_OUTPUT
      
      - name: Final cleanup - ensure no duplicates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
          OUTPUT_DIR: /tmp/empty_for_final_scan
          RELEASE_TAG: latest
        run: |
          echo "==> 最终清理：确保没有重复版本"
          # 强制使用扫描重复版本模式
          mkdir -p "$OUTPUT_DIR"
          bash scripts/clean-old-assets.sh
          
          echo "==> 最终验证"
          DUPES=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest" | \
            jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .name' | \
            sed 's/-[0-9].*\.pkg\.tar\.zst$//' | sort | uniq -d)
          
          if [ -n "$DUPES" ]; then
            echo "❌ 错误：发布前仍存在重复版本："
            echo "$DUPES"
            echo "请检查清理脚本或手动清理"
            exit 1
          else
            echo "✓ 验证通过：无重复版本"
          fi
      
      - name: Update latest release database (snapshot mode)
        if: steps.mode.outputs.mode == 'snapshot'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            **最新构建的 SkorionOS 包仓库**
            
            - 构建时间: ${{ steps.release-info.outputs.datetime }}
            - 提交: `${{ github.sha }}`
            - 仓库总包数: ${{ steps.release-info.outputs.package_count }}
            - 本次更新: ${{ steps.release-info.outputs.new_package_count }} 个包
            
            ## 使用方法
            
            在 `/etc/pacman.conf` 添加：
            ```ini
            [skorion]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/latest
            ```
            
            然后执行：
            ```bash
            sudo pacman -Sy
            sudo pacman -S <package-name>
            ```
          files: output/*
          fail_on_unmatched_files: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update latest release description (incremental mode)
        if: steps.mode.outputs.mode == 'incremental'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            **最新构建的 SkorionOS 包仓库**
            
            - 构建时间: ${{ steps.release-info.outputs.datetime }}
            - 提交: `${{ github.sha }}`
            - 仓库总包数: ${{ steps.release-info.outputs.package_count }}
            - 本次更新: ${{ steps.release-info.outputs.new_package_count }} 个包
            
            ## 使用方法
            
            在 `/etc/pacman.conf` 添加：
            ```ini
            [skorion]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/latest
            ```
            
            然后执行：
            ```bash
            sudo pacman -Sy
            sudo pacman -S <package-name>
            ```
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download all packages for dated snapshot
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.create_snapshot)
        run: |
          echo "==> 从 latest release 下载所有包以创建日期快照"
          
          # 获取 latest release 信息
          LATEST_JSON=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/latest")
          
          # 下载所有包文件（数据库已经在 output/ 中了）
          echo "$LATEST_JSON" | jq -r '.assets[] | select(.name | endswith(".pkg.tar.zst")) | .browser_download_url' | while read url; do
            filename=$(basename "$url")
            # URL 解码文件名
            filename=$(python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$filename")
            echo "  下载 $filename"
            curl -sL "$url" -o "output/$filename"
          done
          
          pkg_count=$(ls -1 output/*.pkg.tar.zst 2>/dev/null | wc -l)
          echo "==> 共下载 $pkg_count 个包，准备创建快照"
      
      - name: Create dated snapshot
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.create_snapshot)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-info.outputs.date }}
          name: Snapshot - ${{ steps.release-info.outputs.date }}
          body: |
            **归档快照**
            
            - 构建时间: ${{ steps.release-info.outputs.datetime }}
            - 提交: `${{ github.sha }}`
            - 仓库总包数: ${{ steps.release-info.outputs.package_count }}
            
            此版本为自动创建的快照，可用于回滚到特定日期的包集合。
            
            ## 使用方法
            
            在 `/etc/pacman.conf` 添加：
            ```ini
            [skorion]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/${{ steps.release-info.outputs.date }}
            ```
          files: output/*
          fail_on_unmatched_files: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
