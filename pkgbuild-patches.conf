# PKGBUILD patch rules for AUR packages
# Format: package_name|||search_string|||replace_string
# - Lines starting with '#' are comments
# - Empty lines are ignored
# - Multiple rules for the same package are applied in order
# - The search string is treated as a literal string (not regex)

# mesa-git: upstream llvm bumped to 22, fix soname dependency
mesa-git|||libLLVM.so=21.1-64|||libLLVM.so=22.1-64
lib32-mesa-git|||libLLVM.so=21.1-64|||libLLVM.so=22.1-64
